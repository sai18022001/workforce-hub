server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html — React Router handles them client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy GraphQL requests to backend — avoids CORS issues in production
    # /query on the frontend proxies to http://backend:8080/query
    location /query {
        proxy_pass http://backend:8080/query;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache static assets aggressively — JS/CSS files have content hashes in names
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}