name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        working-directory: ./backend
        run: go mod tidy

      - name: Build
        working-directory: ./backend
        # ./... means "build all packages recursively from current directory"
        run: go build ./...

      - name: Run tests
        working-directory: ./backend
        # -v = verbose output, shows each test name and PASS/FAIL
        # -count=1 = disables test caching, always runs fresh
        run: go test ./... -v -count=1

  frontend:
    name: React Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        # npm ci = clean install, faster than npm install, uses package-lock.json exactly
        # this is always preferred over npm install in CI
        run: npm ci

      - name: Type check
        working-directory: ./frontend
        # --noEmit = check types but don't output JS files
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./frontend
        run: npm run build